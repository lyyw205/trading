{% extends "base.html" %}
{% block title %}일일 리포트{% endblock %}
{% block content %}
<div class="page-header">
    <h1>일일 리포트</h1>
    <button class="btn btn-primary btn-sm" id="generate-btn" onclick="generateReport()">지금 생성</button>
</div>

<div id="reports-list" class="reports-container">
    <div class="loading-spinner">로딩 중...</div>
</div>

<style>
.reports-container { max-width: 1000px; }
.report-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
}
.report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    gap: 16px;
}
.report-header:hover { background: var(--hover-bg); }
.report-date {
    font-weight: 600;
    font-size: 0.95rem;
    min-width: 100px;
}
.report-stats {
    display: flex;
    gap: 16px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    flex: 1;
    flex-wrap: wrap;
}
.report-stats span { white-space: nowrap; }
.health-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.82rem;
}
.health-good { background: rgba(34,197,94,0.15); color: #16a34a; }
.health-warn { background: rgba(234,179,8,0.15); color: #ca8a04; }
.health-bad { background: rgba(239,68,68,0.15); color: #dc2626; }
.report-body {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
}
.report-body.open { display: block; }

/* Section tabs */
.section-tabs {
    display: flex;
    gap: 0;
    margin-top: 12px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
}
.section-tab {
    padding: 8px 14px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    color: var(--text-secondary);
    transition: color 0.15s, border-color 0.15s;
}
.section-tab:hover { color: var(--text-primary); }
.section-tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent, #3b82f6);
}
.section-panel { display: none; padding-top: 12px; }
.section-panel.active { display: block; }

/* Detail grid */
.detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.detail-section h4 {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.detail-section ul { list-style: none; padding: 0; margin: 0; }
.detail-section li {
    font-size: 0.88rem;
    padding: 3px 0;
    display: flex;
    justify-content: space-between;
}
.detail-section li .count {
    font-weight: 600;
    color: var(--text-primary);
}

/* Account table */
.acct-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
    margin-top: 4px;
}
.acct-table th {
    text-align: left;
    padding: 6px 8px;
    font-weight: 600;
    font-size: 0.78rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
}
.acct-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
}
.acct-table tr:last-child td { border-bottom: none; }
.acct-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.acct-table .profit-pos { color: #16a34a; font-weight: 600; }
.acct-table .profit-neg { color: #dc2626; font-weight: 600; }
.acct-table .profit-zero { color: var(--text-secondary); }

/* Status indicators */
.status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}
.status-healthy { background: #16a34a; }
.status-degraded { background: #ca8a04; }
.status-disabled { background: #dc2626; }
.status-recovered { background: #3b82f6; }

.pause-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
}
.pause-ACTIVE { background: rgba(34,197,94,0.15); color: #16a34a; }
.pause-THROTTLED { background: rgba(234,179,8,0.15); color: #ca8a04; }
.pause-PAUSED { background: rgba(239,68,68,0.15); color: #dc2626; }

/* Hourly heatmap */
.hourly-heatmap {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    margin-top: 6px;
}
.hour-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 600;
    min-height: 28px;
    position: relative;
}
.hour-cell .hour-label {
    position: absolute;
    bottom: -14px;
    font-size: 0.6rem;
    color: var(--text-secondary);
    font-weight: 400;
}
.heatmap-legend {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 18px;
    font-size: 0.72rem;
    color: var(--text-secondary);
}
.heatmap-legend .swatch {
    width: 12px; height: 12px;
    border-radius: 2px;
}

/* Reconciliation cards */
.recon-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
}
.recon-stat {
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    background: var(--hover-bg, rgba(0,0,0,0.03));
}
.recon-stat .val { font-size: 1.4rem; font-weight: 700; }
.recon-stat .lbl { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }
.recon-ok { color: #16a34a; }
.recon-warn { color: #ca8a04; }
.recon-bad { color: #dc2626; }

/* Server health */
.server-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.server-card {
    padding: 10px 14px;
    border-radius: 6px;
    background: var(--hover-bg, rgba(0,0,0,0.03));
}
.server-card h5 {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin: 0 0 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.server-card .kv { display: flex; justify-content: space-between; font-size: 0.83rem; padding: 2px 0; }
.server-card .kv .k { color: var(--text-secondary); }
.server-card .kv .v { font-weight: 600; font-variant-numeric: tabular-nums; }

/* Portfolio */
.portfolio-totals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
}
.portfolio-stat {
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    background: var(--hover-bg, rgba(0,0,0,0.03));
}
.portfolio-stat .val { font-size: 1.2rem; font-weight: 700; }
.portfolio-stat .lbl { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }

.telegram-status {
    font-size: 0.78rem;
    color: var(--text-secondary);
}
.empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-secondary);
}

@media (max-width: 768px) {
    .detail-grid { grid-template-columns: 1fr; }
    .server-grid { grid-template-columns: 1fr; }
    .recon-summary { grid-template-columns: 1fr; }
    .portfolio-totals { grid-template-columns: 1fr; }
    .report-stats { gap: 8px; }
    .hourly-heatmap { grid-template-columns: repeat(12, 1fr); }
}
</style>

<script>
function _esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s ?? '');
    return d.innerHTML;
}

function _profitCls(v) {
    const n = parseFloat(v) || 0;
    return n > 0 ? 'profit-pos' : n < 0 ? 'profit-neg' : 'profit-zero';
}

function _profitFmt(v) {
    const n = parseFloat(v) || 0;
    return (n >= 0 ? '+' : '') + n.toFixed(2);
}

function _pct(v) {
    return ((parseFloat(v) || 0) * 100).toFixed(1) + '%';
}

function switchTab(cardId, tabName) {
    const card = document.getElementById(cardId);
    card.querySelectorAll('.section-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
    card.querySelectorAll('.section-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tabName));
}

function renderHourlyHeatmap(hourlyErrors) {
    if (!hourlyErrors || hourlyErrors.length !== 24) return '<div class="empty-state">데이터 없음</div>';
    const max = Math.max(...hourlyErrors, 1);
    const cells = hourlyErrors.map((cnt, h) => {
        const intensity = cnt / max;
        let bg;
        if (cnt === 0) bg = 'rgba(34,197,94,0.12)';
        else if (intensity < 0.3) bg = 'rgba(234,179,8,0.2)';
        else if (intensity < 0.6) bg = 'rgba(234,179,8,0.45)';
        else bg = `rgba(239,68,68,${0.2 + intensity * 0.6})`;
        const showLabel = h % 3 === 0;
        return `<div class="hour-cell" style="background:${bg}" title="${h}시: ${cnt}건">
            ${cnt > 0 ? cnt : ''}
            ${showLabel ? `<span class="hour-label">${h}</span>` : ''}
        </div>`;
    }).join('');
    return `<div class="hourly-heatmap">${cells}</div>
        <div class="heatmap-legend">
            <div class="swatch" style="background:rgba(34,197,94,0.12)"></div> 0
            <div class="swatch" style="background:rgba(234,179,8,0.2)"></div> 낮음
            <div class="swatch" style="background:rgba(234,179,8,0.45)"></div> 보통
            <div class="swatch" style="background:rgba(239,68,68,0.7)"></div> 높음
        </div>`;
}

function renderAccounts(accounts) {
    if (!accounts || !accounts.length) return '<div class="empty-state">계정 없음</div>';
    const rows = accounts.map(a => {
        const name = _esc(a.name || String(a.account_id).slice(0,8));
        const cbDot = `<span class="status-dot status-${a.cb_status || 'healthy'}"></span>`;
        const pauseBadge = `<span class="pause-badge pause-${a.buy_pause_state || 'ACTIVE'}">${a.buy_pause_state || 'ACTIVE'}</span>`;
        const profit = parseFloat(a.net_profit_usdt) || 0;
        return `<tr>
            <td>${cbDot}${name}</td>
            <td class="num">${a.bought_lots || 0}</td>
            <td class="num">${a.closed_lots || 0}</td>
            <td class="num ${_profitCls(profit)}">${_profitFmt(profit)}</td>
            <td class="num">${_pct(a.win_rate)}</td>
            <td class="num">${parseFloat(a.total_fees_usdt || 0).toFixed(2)}</td>
            <td class="num">${parseFloat(a.avg_hold_minutes || 0).toFixed(0)}분</td>
            <td>${pauseBadge}</td>
            <td class="num">${a.errors || 0}</td>
            <td class="num">${a.criticals || 0}</td>
        </tr>`;
    }).join('');
    return `<div style="overflow-x:auto"><table class="acct-table">
        <thead><tr>
            <th>계정</th><th class="num">매수</th><th class="num">매도</th>
            <th class="num">손익(USDT)</th><th class="num">승률</th><th class="num">수수료</th>
            <th class="num">평균보유</th><th>매수상태</th><th class="num">ERR</th><th class="num">CRIT</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table></div>`;
}

function renderAccountDetail(accounts) {
    if (!accounts || !accounts.length) return '';
    const rows = accounts.map(a => {
        const name = _esc(a.name || String(a.account_id).slice(0,8));
        const cbDot = `<span class="status-dot status-${a.cb_status || 'healthy'}"></span>`;
        const cbLabel = {healthy:'정상', degraded:'주의', disabled:'중단', recovered:'복구됨'}[a.cb_status] || a.cb_status;
        const pauseReason = a.buy_pause_reason ? ` (${_esc(a.buy_pause_reason)})` : '';
        const lastSuccess = a.last_success_at ? new Date(a.last_success_at).toLocaleString('ko-KR', {timeZone:'Asia/Seoul', hour:'2-digit', minute:'2-digit'}) : '-';
        return `<tr>
            <td>${cbDot}${name}</td>
            <td>${cbLabel}</td>
            <td class="num">${a.cb_failures || 0}</td>
            <td class="num">${a.auto_recovery_attempts || 0}</td>
            <td>${lastSuccess}</td>
            <td><span class="pause-badge pause-${a.buy_pause_state || 'ACTIVE'}">${a.buy_pause_state || 'ACTIVE'}</span>${pauseReason}</td>
            <td class="num">${a.consecutive_low_balance || 0}</td>
            <td class="num">${parseFloat(a.pending_earnings_usdt || 0).toFixed(2)}</td>
        </tr>`;
    }).join('');
    return `<div style="overflow-x:auto"><table class="acct-table">
        <thead><tr>
            <th>계정</th><th>CB상태</th><th class="num">실패수</th><th class="num">복구시도</th>
            <th>마지막성공</th><th>매수상태</th><th class="num">잔고부족</th><th class="num">미정산(USDT)</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table></div>`;
}

function renderPortfolio(portfolio) {
    if (!portfolio) return '<div class="empty-state">데이터 없음</div>';
    const totals = `<div class="portfolio-totals">
        <div class="portfolio-stat"><div class="val">${parseFloat(portfolio.total_cost_basis_usdt || 0).toFixed(2)}</div><div class="lbl">총 투자원금 (USDT)</div></div>
        <div class="portfolio-stat"><div class="val">${portfolio.total_open_positions || 0}</div><div class="lbl">보유 포지션</div></div>
        <div class="portfolio-stat"><div class="val">${portfolio.total_open_lots || 0}</div><div class="lbl">오픈 Lot</div></div>
    </div>`;

    const perAcct = portfolio.per_account || {};
    const acctKeys = Object.keys(perAcct);
    if (!acctKeys.length) return totals + '<div class="empty-state">보유 포지션 없음</div>';

    let tables = '';
    for (const acctId of acctKeys) {
        const data = perAcct[acctId];
        const positions = data.positions || [];
        const posRows = positions.map(p =>
            `<tr>
                <td>${_esc(p.symbol)}</td>
                <td class="num">${parseFloat(p.qty).toFixed(4)}</td>
                <td class="num">${parseFloat(p.avg_entry).toFixed(2)}</td>
                <td class="num">${parseFloat(p.cost_basis_usdt).toFixed(2)}</td>
            </tr>`
        ).join('');
        tables += `<div class="detail-section" style="margin-bottom:12px">
            <h4>${_esc(acctId.slice(0,8))}... (Lots: ${data.open_lots || 0}, 원금: ${parseFloat(data.cost_basis_usdt || 0).toFixed(2)} USDT)</h4>
            <table class="acct-table">
                <thead><tr><th>심볼</th><th class="num">수량</th><th class="num">평균단가</th><th class="num">원금(USDT)</th></tr></thead>
                <tbody>${posRows}</tbody>
            </table>
        </div>`;
    }
    return totals + tables;
}

function renderReconciliation(recon) {
    if (!recon) return '<div class="empty-state">데이터 없음</div>';
    const driftCls = recon.total_drifts === 0 ? 'recon-ok' : recon.total_manual_needed > 0 ? 'recon-bad' : 'recon-warn';
    const summary = `<div class="recon-summary">
        <div class="recon-stat"><div class="val ${driftCls}">${recon.total_drifts || 0}</div><div class="lbl">Drift 감지</div></div>
        <div class="recon-stat"><div class="val recon-ok">${recon.total_auto_resolved || 0}</div><div class="lbl">자동 해소</div></div>
        <div class="recon-stat"><div class="val ${recon.total_manual_needed > 0 ? 'recon-bad' : 'recon-ok'}">${recon.total_manual_needed || 0}</div><div class="lbl">수동 필요</div></div>
    </div>`;

    const perAcct = recon.per_account || [];
    if (!perAcct.length || recon.total_drifts === 0) return summary;

    const rows = perAcct.filter(a => a.drift_count > 0).map(a => {
        const dt = a.drift_types || {};
        return `<tr>
            <td>${_esc(String(a.account_id).slice(0,8))}...</td>
            <td class="num">${a.total_checks || 0}</td>
            <td class="num">${a.drift_count || 0}</td>
            <td class="num">${dt.position || 0}</td>
            <td class="num">${dt.balance || 0}</td>
            <td class="num">${dt.fill_gap || 0}</td>
            <td class="num">${a.auto_resolved || 0}</td>
            <td class="num ${a.manual_needed > 0 ? 'profit-neg' : ''}">${a.manual_needed || 0}</td>
        </tr>`;
    }).join('');
    if (!rows) return summary;

    return summary + `<div style="overflow-x:auto"><table class="acct-table">
        <thead><tr>
            <th>계정</th><th class="num">점검</th><th class="num">Drift</th>
            <th class="num">포지션</th><th class="num">잔고</th><th class="num">Fill갭</th>
            <th class="num">자동해소</th><th class="num">수동필요</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table></div>`;
}

function renderServerHealth(sh) {
    if (!sh) return '<div class="empty-state">데이터 없음</div>';
    const pool = sh.db_pool || {};
    const proc = sh.process || {};
    const tables = sh.top_tables_mb || [];

    let html = '<div class="server-grid">';

    // DB Pool
    html += `<div class="server-card">
        <h5>DB 커넥션 풀</h5>
        <div class="kv"><span class="k">풀 크기</span><span class="v">${pool.pool_size || '-'}</span></div>
        <div class="kv"><span class="k">사용중</span><span class="v">${pool.checked_out || 0}</span></div>
        <div class="kv"><span class="k">유휴</span><span class="v">${pool.checked_in || 0}</span></div>
        <div class="kv"><span class="k">오버플로우</span><span class="v">${pool.overflow || 0} / ${pool.max_overflow || '-'}</span></div>
    </div>`;

    // DB Info
    html += `<div class="server-card">
        <h5>데이터베이스</h5>
        <div class="kv"><span class="k">DB 크기</span><span class="v">${sh.db_size_mb || '-'} MB</span></div>
        <div class="kv"><span class="k">활성 연결</span><span class="v">${sh.db_active_connections || '-'}</span></div>
    </div>`;

    // Process
    if (proc.pid) {
        html += `<div class="server-card">
            <h5>프로세스</h5>
            <div class="kv"><span class="k">PID</span><span class="v">${proc.pid}</span></div>
            <div class="kv"><span class="k">메모리 (RSS)</span><span class="v">${proc.rss_mb || '-'} MB</span></div>
            <div class="kv"><span class="k">CPU</span><span class="v">${proc.cpu_percent || 0}%</span></div>
            <div class="kv"><span class="k">업타임</span><span class="v">${proc.uptime_hours || '-'}시간</span></div>
            <div class="kv"><span class="k">스레드</span><span class="v">${proc.threads || '-'}</span></div>
        </div>`;
    }

    // Top tables
    if (tables.length) {
        html += `<div class="server-card">
            <h5>테이블 크기 Top 5</h5>
            ${tables.map(t => `<div class="kv"><span class="k">${_esc(t.table)}</span><span class="v">${t.size_mb} MB</span></div>`).join('')}
        </div>`;
    }

    html += '</div>';
    return html;
}

async function loadReports() {
    const container = document.getElementById('reports-list');
    try {
        const res = await fetch('/api/reports/daily?limit=30');
        if (!res.ok) throw new Error(res.statusText);
        const reports = await res.json();

        if (!reports.length) {
            container.innerHTML = '<div class="empty-state">아직 생성된 리포트가 없습니다.</div>';
            return;
        }

        container.innerHTML = reports.map((r, idx) => {
            const s = r.summary || {};
            const score = parseFloat(r.health_score) || 0;
            const cls = score >= 80 ? 'health-good' : score >= 50 ? 'health-warn' : 'health-bad';
            const tt = s.trading_totals || {};
            const totalProfit = parseFloat(tt.total_profit_usdt) || 0;
            const cardId = `report-${idx}`;

            return `<div class="report-card" id="${cardId}">
                <div class="report-header" onclick="this.nextElementSibling.classList.toggle('open')">
                    <span class="report-date">${r.report_date}</span>
                    <div class="report-stats">
                        <span>CRIT:${s.total_criticals || 0} ERR:${s.total_errors || 0} CB:${s.cb_events || 0}</span>
                        <span class="${_profitCls(totalProfit)}">${_profitFmt(totalProfit)} USDT</span>
                        <span>매수:${tt.total_bought || 0} 매도:${tt.total_closed || 0}</span>
                        ${r.telegram_sent_at ? '<span class="telegram-status">전송됨</span>' : ''}
                    </div>
                    <span class="health-badge ${cls}">${score.toFixed(0)}</span>
                </div>
                <div class="report-body">
                    <div class="section-tabs">
                        <div class="section-tab active" data-tab="trading" onclick="switchTab('${cardId}','trading')">거래 성과</div>
                        <div class="section-tab" data-tab="status" onclick="switchTab('${cardId}','status')">계정 상태</div>
                        <div class="section-tab" data-tab="portfolio" onclick="switchTab('${cardId}','portfolio')">포트폴리오</div>
                        <div class="section-tab" data-tab="errors" onclick="switchTab('${cardId}','errors')">에러/시간대</div>
                        <div class="section-tab" data-tab="recon" onclick="switchTab('${cardId}','recon')">정합성</div>
                        <div class="section-tab" data-tab="server" onclick="switchTab('${cardId}','server')">서버 현황</div>
                    </div>

                    <div class="section-panel active" data-panel="trading">
                        ${renderAccounts(s.accounts)}
                    </div>

                    <div class="section-panel" data-panel="status">
                        ${renderAccountDetail(s.accounts)}
                    </div>

                    <div class="section-panel" data-panel="portfolio">
                        ${renderPortfolio(s.portfolio)}
                    </div>

                    <div class="section-panel" data-panel="errors">
                        <div class="detail-grid">
                            <div class="detail-section">
                                <h4>주요 에러 모듈</h4>
                                <ul>${(s.top_error_modules || []).map(m =>
                                    `<li><span>${_esc(m.module)}</span><span class="count">${parseInt(m.count) || 0}</span></li>`
                                ).join('') || '<li>없음</li>'}</ul>
                            </div>
                            <div class="detail-section">
                                <h4>시간대별 에러 분포 (KST)</h4>
                                ${renderHourlyHeatmap(s.hourly_errors)}
                            </div>
                        </div>
                    </div>

                    <div class="section-panel" data-panel="recon">
                        ${renderReconciliation(s.reconciliation)}
                    </div>

                    <div class="section-panel" data-panel="server">
                        ${renderServerHealth(s.server_health)}
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        container.innerHTML = '<div class="empty-state">리포트를 불러오지 못했습니다.</div>';
    }
}

async function generateReport() {
    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = '생성 중...';
    try {
        const today = new Date();
        const dateStr = today.toISOString().split('T')[0];
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
        const res = await fetch(`/api/reports/daily/${dateStr}/generate`, {
            method: 'POST',
            headers: { 'x-csrf-token': csrfToken },
        });
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        if (data.status === 'created') {
            alert(`리포트 생성 완료 (건강 점수: ${data.health_score.toFixed(0)})`);
        } else {
            alert('이미 오늘 리포트가 존재합니다.');
        }
        loadReports();
    } catch (e) {
        alert('리포트 생성 실패: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '지금 생성';
    }
}

document.addEventListener('DOMContentLoaded', loadReports);
</script>
{% endblock %}
