{% extends "base.html" %}

{% block title %}로그 - Crypto Multi-Trader{% endblock %}

{% block content %}
<div class="hero-banner">
  <h1 class="page-title">트레이딩 로그</h1>
  <p class="hero-subtitle">실시간 구조화된 로그 뷰어 (필터링 지원)</p>
  <div class="hero-actions">
    <button class="btn btn-hero btn-sm" onclick="openLogGuide()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      로그 가이드
    </button>
    <button class="btn btn-hero btn-sm" onclick="loadLogs()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      새로고침
    </button>
  </div>
</div>

<!-- Critical Alerts Summary -->
<section class="dashboard-section" id="alerts-section" style="display:none;">
  <div class="section-header">
    <h2 class="section-title">중요 알림</h2>
    <span id="alerts-count" style="font-size:0.78rem;color:var(--danger);font-weight:600;"></span>
  </div>
  <div id="alerts-panel" class="alerts-grid"></div>
</section>

<!-- Filters -->
<section class="dashboard-section">
  <div class="section-header">
    <h2 class="section-title">필터</h2>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <span id="log-count-badge" style="font-size:0.8rem;color:var(--text-muted);"></span>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.8rem;color:var(--text-muted);cursor:pointer;">
        <input type="checkbox" id="log-auto-refresh" checked>
        자동 새로고침 (15초)
      </label>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;">
    <select id="filter-account" class="form-input" style="width:auto;min-width:160px;padding:0.3rem 0.5rem;font-size:0.8rem;" onchange="loadLogs()">
      <option value="">전체 계정</option>
      <option value="system">시스템</option>
    </select>
    <select id="filter-level" class="form-input" style="width:auto;padding:0.3rem 0.5rem;font-size:0.8rem;" onchange="loadLogs()">
      <option value="">전체 레벨</option>
      <option value="CRITICAL">CRITICAL</option>
      <option value="ERROR">ERROR</option>
      <option value="WARNING">WARNING</option>
      <option value="INFO">INFO</option>
    </select>
    <input type="text" id="filter-search" class="form-input" placeholder="메시지 검색..." style="width:auto;min-width:200px;padding:0.3rem 0.5rem;font-size:0.8rem;" onkeydown="if(event.key==='Enter')loadLogs();">
    <button class="btn btn-outline btn-sm" onclick="clearFilters()" style="padding:0.3rem 0.5rem;font-size:0.8rem;">초기화</button>
  </div>
</section>

<!-- Log Table -->
<section class="dashboard-section">
  <div id="logs-panel" class="admin-log-viewer">
    <div class="loading-spinner">로딩 중...</div>
  </div>
</section>

<!-- Log Guide Modal -->
<div id="log-guide-modal" class="modal-overlay" style="display:none;">
  <div class="modal-content" style="max-width:900px;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h3 style="margin:0;">로그 해결 가이드</h3>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <input type="text" id="guide-search" class="form-input" placeholder="로그 검색..." style="width:200px;padding:0.3rem 0.5rem;font-size:0.8rem;" oninput="filterGuide()">
        <select id="guide-level-filter" class="form-input" style="width:auto;padding:0.3rem 0.5rem;font-size:0.8rem;" onchange="filterGuide()">
          <option value="">전체 심각도</option>
          <option value="Critical">심각</option>
          <option value="High">높음</option>
          <option value="Medium">보통</option>
          <option value="Low">낮음</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="toggleAllGuide(true)" style="padding:0.2rem 0.4rem;font-size:0.75rem;">전체 펼치기</button>
        <button class="btn btn-outline btn-sm" onclick="toggleAllGuide(false)" style="padding:0.2rem 0.4rem;font-size:0.75rem;">접기</button>
        <button class="btn btn-outline btn-sm" onclick="closeLogGuide()">닫기</button>
      </div>
    </div>
    <div id="guide-content"></div>
  </div>
</div>
{% endblock %}

{% block extra_styles %}
<style>
/* Alerts Summary */
.alerts-grid { display:flex; flex-direction:column; gap:0.5rem; }
.alert-card { display:flex; align-items:flex-start; gap:0.65rem; padding:0.65rem 0.85rem; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; transition:background 0.15s; }
.alert-card:hover { background:var(--bg-tertiary); }
.alert-card-icon { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.alert-card-icon svg { width:14px; height:14px; }
.alert-card-icon.critical { background:var(--danger-light); color:var(--danger); }
.alert-card-icon.error { background:var(--warning-light); color:var(--warning); }
.alert-card-body { flex:1; min-width:0; }
.alert-card-header { display:flex; align-items:center; gap:0.4rem; margin-bottom:0.15rem; }
.alert-card-account { font-size:0.72rem; font-weight:600; color:var(--primary); cursor:pointer; }
.alert-card-account:hover { text-decoration:underline; }
.alert-card-module { font-size:0.68rem; color:var(--text-muted); }
.alert-card-time { font-size:0.68rem; color:var(--text-muted); margin-left:auto; white-space:nowrap; }
.alert-card-msg { font-size:0.78rem; color:var(--text); line-height:1.5; }
.alert-card-level { font-size:0.65rem; font-weight:700; padding:1px 5px; border-radius:3px; flex-shrink:0; }
.alert-card-level.CRITICAL { background:#dc2626; color:#fff; }
.alert-card-level.ERROR { color:#fca5a5; }

.admin-log-viewer { max-height:calc(100vh - 340px); min-height:400px; overflow-y:auto; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; padding:0.5rem; font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; font-size:0.8rem; line-height:1.6; }
.log-row { padding:0.25rem 0.4rem; border-bottom:1px solid var(--border); display:grid; grid-template-columns:145px 70px 100px 80px 1fr; gap:0.5rem; align-items:start; }
.log-row:last-child { border-bottom:none; }
.log-row:hover { background:rgba(255,255,255,0.03); }
.log-row-ts { color:var(--text-muted); white-space:nowrap; }
.log-row-level { font-weight:600; border-radius:3px; text-align:center; padding:0 4px; }
.log-row-level-CRITICAL { color:#fff; background:#dc2626; }
.log-row-level-ERROR { color:#fca5a5; }
.log-row-level-WARNING { color:#fbbf24; }
.log-row-level-INFO { color:#60a5fa; }
.log-row-level-DEBUG { color:var(--text-muted); }
.log-row-account { color:var(--primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.log-row-account:hover { text-decoration:underline; }
.log-row-module { color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.log-row-msg { color:var(--text-primary); word-break:break-word; }
.log-empty { text-align:center; color:var(--text-muted); padding:2rem; }
@media (max-width: 768px) {
  .log-row { grid-template-columns:1fr; gap:0.2rem; }
  .log-row-ts, .log-row-account { font-size:0.7rem; }
}
/* Guide Modal */
.guide-module { margin-bottom:1rem; }
.guide-module-header { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.75rem; background:var(--bg-secondary); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-weight:600; font-size:0.9rem; }
.guide-module-header:hover { background:var(--bg-tertiary, rgba(255,255,255,0.05)); }
.guide-module-header .chevron { transition:transform 0.2s; font-size:0.7rem; color:var(--text-muted); }
.guide-module-header.open .chevron { transform:rotate(90deg); }
.guide-module-body { display:none; border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; }
.guide-module-body.open { display:block; }
.guide-entry { border-bottom:1px solid var(--border); }
.guide-entry:last-child { border-bottom:none; }
.guide-entry-header { display:flex; align-items:center; gap:0.5rem; padding:0.4rem 0.75rem; cursor:pointer; font-size:0.8rem; }
.guide-entry-header:hover { background:rgba(255,255,255,0.02); }
.guide-entry-header .chevron { transition:transform 0.2s; font-size:0.6rem; color:var(--text-muted); }
.guide-entry-header.open .chevron { transform:rotate(90deg); }
.guide-severity { font-size:0.7rem; font-weight:600; padding:1px 6px; border-radius:3px; white-space:nowrap; }
.guide-severity-Critical { background:#dc2626; color:#fff; }
.guide-severity-High { background:#f59e0b; color:#000; }
.guide-severity-Medium { background:#3b82f6; color:#fff; }
.guide-severity-Low { background:var(--border); color:var(--text-muted); }
.guide-level-badge { font-size:0.7rem; font-weight:600; padding:1px 5px; border-radius:3px; }
.guide-level-CRITICAL { background:#dc2626; color:#fff; }
.guide-level-ERROR { color:#fca5a5; }
.guide-level-WARNING { color:#fbbf24; }
.guide-level-INFO { color:#60a5fa; }
.guide-entry-detail { display:none; padding:0.5rem 0.75rem 0.75rem 1.5rem; font-size:0.8rem; line-height:1.7; }
.guide-entry-detail.open { display:block; }
.guide-entry-detail dt { font-weight:600; color:var(--text-muted); margin-top:0.4rem; }
.guide-entry-detail dd { margin:0 0 0.2rem 0; }
.guide-entry-detail code { background:var(--bg-secondary); padding:1px 4px; border-radius:3px; font-size:0.75rem; }
.guide-entry-pattern { font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; font-size:0.8rem; color:var(--text-primary); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
{% endblock %}

{% block scripts %}
<script>
let _autoRefreshTimer = null;

// ============================================================
// Log Guide Data
// ============================================================
const LOG_GUIDE = [
  { module: "account_trader.py", desc: "계정 트레이딩 루프 (19)", entries: [
    { level:"CRITICAL", severity:"Critical", pattern:"Circuit breaker triggered: N consecutive failures", description:"5회 연속 트레이딩 사이클 실패로 해당 계정의 자동매매가 중단되었습니다.", cause:"API 키 만료/무효, 바이낸스 서버 장애, 네트워크 불안정, DB 장시간 미응답 등 복합적 원인으로 연속 실패 누적.", resolution:"1. /admin/system에서 해당 계정의 CB 상태 확인\n2. API 키가 유효한지 바이낸스 콘솔에서 확인\n3. 네트워크/DB 상태 점검\n4. 원인 해결 후 관리자 페이지에서 CB 리셋 (자동 복구는 30분 쿨다운 후 시도)" },
    { level:"WARNING", severity:"Critical", pattern:"Circuit breaker already tripped", description:"트레이더 시작 시 이미 CB가 활성화되어 있어 루프를 시작하지 않았습니다.", cause:"이전에 CB가 발동된 후 아직 리셋되지 않은 상태.", resolution:"CB 원인을 해결한 후 관리자 페이지에서 수동 리셋하거나, 자동 복구(10분 간격 체크, 30분 쿨다운)를 기다리세요." },
    { level:"ERROR", severity:"Critical", pattern:"_init_client() failed", description:"계정 초기화 실패. 바이낸스 클라이언트를 생성할 수 없어 매매가 불가합니다.", cause:"API 키/시크릿이 잘못되었거나, 바이낸스 서버 시간 동기화 실패, IP 화이트리스트 미설정.", resolution:"1. 해당 계정의 API 키가 올바른지 확인\n2. 바이낸스에서 IP 화이트리스트에 서버 IP가 포함되어 있는지 확인\n3. 서버 시간이 정확한지 확인 (ntpd/chrony)" },
    { level:"ERROR", severity:"Critical", pattern:"step() timed out (180s)", description:"트레이딩 사이클 하나가 180초 내에 완료되지 못했습니다. CB 카운터가 증가합니다.", cause:"바이낸스 API 응답 지연, DB 쿼리 타임아웃, 또는 전략 로직 내 무한루프.", resolution:"1. System Health에서 DB 커넥션 풀 상태 확인\n2. 바이낸스 API 상태 페이지 확인\n3. 해당 시점의 슬로우 쿼리 로그 확인" },
    { level:"ERROR", severity:"Critical", pattern:"Permanent error, triggering CB", description:"복구 불가능한 영구적 오류가 감지되어 즉시 CB가 발동됩니다.", cause:"InvalidAPIKey, AuthenticationError 등 재시도해도 해결 불가능한 오류.", resolution:"API 키를 교체하거나 계정 설정을 수정한 후 CB를 리셋하세요." },
    { level:"ERROR", severity:"High", pattern:"Transient error (Nx)", description:"일시적 오류가 발생했습니다. 연속 누적 시 CB로 이어질 수 있습니다.", cause:"네트워크 순간 끊김, 바이낸스 일시적 503/504, DB 커넥션 풀 고갈.", resolution:"1~2회는 자동 복구됩니다. 반복되면 네트워크/DB/API 상태를 점검하세요." },
    { level:"WARNING", severity:"High", pattern:"DB connection error (attempt N/3)", description:"DB 연결 실패로 재시도 중입니다. 3회까지 시도합니다.", cause:"PostgreSQL 다운, 커넥션 풀 고갈, 네트워크 문제.", resolution:"1. PostgreSQL 프로세스 상태 확인\n2. System Health에서 DB 풀 상태 확인\n3. pg_stat_activity에서 idle 커넥션 과다 여부 확인" },
    { level:"WARNING", severity:"High", pattern:"Balance check failed, skipping buy", description:"잔고 조회 API 실패로 해당 사이클의 매수 평가를 건너뜁니다.", cause:"바이낸스 API 타임아웃 또는 레이트 리밋.", resolution:"일시적인 경우가 대부분입니다. 반복되면 API 키의 권한(읽기 권한) 및 레이트 리밋 상태를 확인하세요." },

    { level:"WARNING", severity:"High", pattern:"Rate limited, backing off", description:"바이낸스 API 레이트 리밋에 도달하여 일정 시간 대기합니다.", cause:"짧은 시간에 너무 많은 API 호출. 계정 수가 많거나 루프 간격이 너무 짧을 때 발생.", resolution:"1. 계정별 loop_interval_sec을 늘리기\n2. 불필요한 API 호출 줄이기\n3. 바이낸스 API 키 가중치 확인" },
    { level:"WARNING", severity:"Medium", pattern:"Cannot parse symbol, skipping", description:"심볼 포맷이 올바르지 않아 처리를 건너뜁니다.", cause:"콤보에 잘못된 심볼명이 설정됨 (예: BTC/USDT 대신 BTCUSDT 필요).", resolution:"해당 콤보의 심볼 설정을 확인하고 바이낸스 표준 포맷(BTCUSDT)으로 수정하세요." },
    { level:"WARNING", severity:"High", pattern:"Open orders sync failed", description:"미체결 주문 동기화 실패. 주문 상태가 DB와 불일치할 수 있습니다.", cause:"바이낸스 API 타임아웃 또는 일시적 오류.", resolution:"다음 사이클에서 자동 재시도됩니다. 반복되면 Reconciliation 수동 실행을 고려하세요." },
    { level:"WARNING", severity:"Medium", pattern:"Order sync failed", description:"개별 주문 조회 실패. 해당 주문의 최신 상태를 DB에 반영하지 못했습니다.", cause:"바이낸스 API 타임아웃.", resolution:"다음 사이클에서 자동 재시도됩니다." },
    { level:"WARNING", severity:"High", pattern:"Fills sync failed", description:"체결 내역 동기화 실패. 체결된 주문이 DB에 반영되지 않을 수 있습니다.", cause:"바이낸스 API 타임아웃.", resolution:"반복되면 관리자 페이지에서 Reconciliation repair를 실행하세요." },
    { level:"WARNING", severity:"Medium", pattern:"Fill order sync failed", description:"체결 내역에 포함된 개별 주문 조회 실패.", cause:"바이낸스 API 타임아웃.", resolution:"다음 사이클에서 자동 재시도됩니다." },
    { level:"WARNING", severity:"High", pattern:"Fills processing failed", description:"체결 처리 블록 전체에서 예외 발생. 해당 심볼의 체결이 미반영됩니다.", cause:"DB 오류 또는 데이터 파싱 오류.", resolution:"로그의 에러 상세를 확인하고, DB 상태를 점검하세요." },
    { level:"INFO", severity:"Medium", pattern:"Trading loop started", description:"해당 계정의 트레이딩 루프가 정상 시작되었습니다.", cause:"정상 동작. 앱 시작 또는 계정 활성화 시 발생.", resolution:"조치 불필요. 정상 라이프사이클 이벤트입니다." },
    { level:"INFO", severity:"High", pattern:"Sell detected + balance recovered", description:"매수 일시정지(PAUSED) 중 매도가 발생하고 잔고가 회복되어 매수를 재개합니다.", cause:"정상 동작. TP 매도로 USDT 잔고가 임계값 이상으로 회복됨.", resolution:"조치 불필요. 자동으로 ACTIVE 상태로 전환됩니다." },
    { level:"WARNING", severity:"Medium", pattern:"Failed to send CB alert", description:"CB 발동 후 텔레그램 알림 전송 실패.", cause:"텔레그램 API 타임아웃.", resolution:"CB 자체는 정상 발동됨. 텔레그램 봇 설정을 확인하세요." },
  ]},
  { module: "trading_engine.py", desc: "엔진 관리 (9)", entries: [

// ============================================================
// Log Translation (English -> Korean)
// ============================================================
function _patternToRegex(pattern) {
  let re = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  re = re.replace(/N\/M/g, '[\\d.]+/[\\d.]+');
  re = re.replace(/N\/3/g, '[\\d.]+/3');
  re = re.replace(/Nx/g, '[\\d.]+x');
  re = re.replace(/\bN\b/g, '[\\d.]+');
  re = re.replace(/SYMBOL/g, '\\S+');
  re = re.replace(/STATUS/g, '\\w+');
  re = re.replace(/\\\.\\\.\\./g, '.*');
  // Allow extra words between tokens for flexible matching
  return new RegExp(re, 'i');
}

const _translationMap = [];
for (const mod of LOG_GUIDE) {
  for (const e of mod.entries) {
    try {
      _translationMap.push({ regex: _patternToRegex(e.pattern), korean: e.description });
    } catch (_) { /* skip invalid patterns */ }
  }
}

function _translateMsg(msg) {
  for (const t of _translationMap) {
    if (t.regex.test(msg)) return t.korean;
  }
  return null;
}

// ============================================================
// Critical Alerts Summary
// ============================================================
async function loadAlerts() {
  const section = document.getElementById('alerts-section');
  const panel = document.getElementById('alerts-panel');
  const countEl = document.getElementById('alerts-count');
  if (!section || !panel) return;

  try {
    const resp = await apiFetch('/api/logs/all?limit=50&level=CRITICAL');
    const criticals = resp.ok ? await resp.json() : [];
    const resp2 = await apiFetch('/api/logs/all?limit=50&level=ERROR');
    const errors = resp2.ok ? await resp2.json() : [];

    // Merge, deduplicate by timestamp+msg, sort newest first, limit 10
    const seen = new Set();
    const all = [...criticals, ...errors].filter(log => {
      const key = (log.ts || '') + (log.msg || '');
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    }).slice(0, 10);

    if (!all.length) {
      section.style.display = 'none';
      return;
    }

    section.style.display = '';
    countEl.textContent = all.length + '건';

    panel.innerHTML = all.map(log => {
      const lvl = log.level || 'ERROR';
      const isCrit = lvl === 'CRITICAL';
      const acct = log.account_id || 'system';
      const acctLabel = acct === 'system' ? '시스템' : (acct.length > 12 ? acct.slice(0, 8) + '...' : acct);
      const mod = _esc(log.module || '');
      const rawMsg = log.msg || '';
      const korean = _translateMsg(rawMsg);
      const msg = korean || rawMsg;
      const ts = log.ts || '';
      const timeAgo = _relativeTime(ts);

      return `<div class="alert-card">
        <div class="alert-card-icon ${isCrit ? 'critical' : 'error'}">
          ${isCrit
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'}
        </div>
        <div class="alert-card-body">
          <div class="alert-card-header">
            <span class="alert-card-level ${lvl}">${lvl}</span>
            <span class="alert-card-account" onclick="filterByAccount('${_esc(acct)}')">${_esc(acctLabel)}</span>
            <span class="alert-card-module">${mod}</span>
            <span class="alert-card-time">${timeAgo}</span>
          </div>
          <div class="alert-card-msg"${korean ? ' title="' + _esc(rawMsg) + '"' : ''}>${_esc(msg)}</div>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    section.style.display = 'none';
  }
}

function _formatKST(tsStr) {
  if (!tsStr) return '';
  try {
    const d = new Date(tsStr.replace(' ', 'T'));
    return d.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  } catch (_) { return tsStr; }
}

function _relativeTime(tsStr) {
  if (!tsStr) return '';
  try {
    const ts = new Date(tsStr);
    const now = new Date();
    const diffMs = now - ts;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return '방금';
    if (mins < 60) return mins + '분 전';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + '시간 전';
    const days = Math.floor(hours / 24);
    return days + '일 전';
  } catch (_) { return tsStr; }
}

// ============================================================
// Log Viewer Functions
// ============================================================
async function loadLogs() {
  const panel = document.getElementById('logs-panel');
  const accountEl = document.getElementById('filter-account');
  const levelEl = document.getElementById('filter-level');
  const searchEl = document.getElementById('filter-search');

  const account = accountEl ? accountEl.value : '';
  const level = levelEl ? levelEl.value : '';
  const search = searchEl ? searchEl.value.trim() : '';

  try {
    let url = '/api/logs/all?limit=500';
    if (account) url += '&account_id=' + encodeURIComponent(account);
    if (level) url += '&level=' + encodeURIComponent(level);
    if (search) url += '&search=' + encodeURIComponent(search);

    const resp = await apiFetch(url);
    if (!resp.ok) { panel.innerHTML = '<div class="log-empty">로그를 불러오지 못했습니다</div>'; return; }
    const logs = await resp.json();

    const badge = document.getElementById('log-count-badge');
    if (badge) badge.textContent = logs.length + ' entries';

    if (!logs.length) {
      panel.innerHTML = '<div class="log-empty">필터에 맞는 로그가 없습니다</div>';
      return;
    }

    let html = '';
    for (const log of logs) {
      const ts = _formatKST(log.ts || '');
      const lvl = log.level || 'INFO';
      const acct = log.account_id || 'system';
      const acctShort = acct.length > 12 ? acct.slice(0, 8) + '...' : acct;
      const mod = _esc(log.module || '');
      const rawMsg = log.msg || '';
      const korean = _translateMsg(rawMsg);
      const displayMsg = korean ? _esc(korean) : _esc(rawMsg);
      const tooltip = korean ? ' title="' + _esc(rawMsg) + '"' : '';
      html += '<div class="log-row">'
        + '<span class="log-row-ts">' + ts + '</span>'
        + '<span class="log-row-level log-row-level-' + lvl + '">' + lvl + '</span>'
        + '<span class="log-row-account" title="' + _esc(acct) + '" onclick="filterByAccount(\'' + _esc(acct) + '\')">' + _esc(acctShort) + '</span>'
        + '<span class="log-row-module" title="' + mod + '">' + mod + '</span>'
        + '<span class="log-row-msg"' + tooltip + '>' + displayMsg + '</span>'
        + '</div>';
    }
    panel.innerHTML = html;
    panel.scrollTop = panel.scrollHeight;
  } catch (e) {
    console.error('로그를 불러오지 못했습니다', e);
    panel.innerHTML = '<div class="log-empty">로그 로딩 중 오류 발생</div>';
  }
}

function filterByAccount(accountId) {
  const el = document.getElementById('filter-account');
  let found = false;
  for (const opt of el.options) {
    if (opt.value === accountId) { found = true; break; }
  }
  if (!found) {
    const opt = document.createElement('option');
    opt.value = accountId;
    opt.textContent = accountId.length > 12 ? accountId.slice(0, 8) + '...' : accountId;
    el.appendChild(opt);
  }
  el.value = accountId;
  loadLogs();
}

function clearFilters() {
  document.getElementById('filter-account').value = '';
  document.getElementById('filter-level').value = '';
  document.getElementById('filter-search').value = '';
  loadLogs();
}

function _esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function populateAccountFilter() {
  try {
    const resp = await apiFetch('/api/accounts');
    if (!resp.ok) return;
    const data = await resp.json();
    const accounts = data.accounts || [];
    const el = document.getElementById('filter-account');
    for (const a of accounts) {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.name || a.id.slice(0, 8);
      el.appendChild(opt);
    }
  } catch (e) { /* ignore */ }
}

function setupAutoRefresh() {
  const cb = document.getElementById('log-auto-refresh');
  function toggle() {
    if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }
    if (cb && cb.checked) {
      _autoRefreshTimer = setInterval(() => { loadAlerts(); loadLogs(); }, 15000);
    }
  }
  if (cb) cb.addEventListener('change', toggle);
  toggle();
}

// ============================================================
// Log Guide Functions
// ============================================================
function openLogGuide() {
  document.getElementById('log-guide-modal').style.display = 'flex';
  renderGuide();
}

function closeLogGuide() {
  document.getElementById('log-guide-modal').style.display = 'none';
}

function renderGuide() {
  const container = document.getElementById('guide-content');
  const searchQ = (document.getElementById('guide-search').value || '').toLowerCase();
  const sevFilter = document.getElementById('guide-level-filter').value;

  let html = '';
  for (const mod of LOG_GUIDE) {
    let entries = mod.entries;
    if (sevFilter) entries = entries.filter(e => e.severity === sevFilter);
    if (searchQ) entries = entries.filter(e =>
      e.pattern.toLowerCase().includes(searchQ) ||
      e.description.toLowerCase().includes(searchQ) ||
      e.cause.toLowerCase().includes(searchQ) ||
      e.resolution.toLowerCase().includes(searchQ)
    );
    if (!entries.length) continue;

    const modId = 'gmod-' + mod.module.replace(/\./g, '-');
    html += '<div class="guide-module">';
    html += '<div class="guide-module-header" onclick="toggleGuideModule(\'' + modId + '\')" id="' + modId + '-hdr">';
    html += '<span class="chevron">&#9654;</span>';
    html += '<span>' + _esc(mod.module) + '</span>';
    html += '<span style="color:var(--text-muted);font-weight:400;font-size:0.8rem;margin-left:0.5rem;">' + _esc(mod.desc) + '</span>';
    html += '<span style="margin-left:auto;font-size:0.75rem;color:var(--text-muted);">' + entries.length + '</span>';
    html += '</div>';
    html += '<div class="guide-module-body" id="' + modId + '-body">';

    const _sevKo = { Critical:'심각', High:'높음', Medium:'보통', Low:'낮음' };
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      const eid = modId + '-e' + i;
      const sevLabel = _sevKo[e.severity] || e.severity;
      html += '<div class="guide-entry">';
      html += '<div class="guide-entry-header" onclick="toggleGuideEntry(\'' + eid + '\')" id="' + eid + '-hdr">';
      html += '<span class="chevron">&#9654;</span>';
      html += '<span class="guide-level-badge guide-level-' + e.level + '">' + e.level + '</span>';
      html += '<span class="guide-severity guide-severity-' + e.severity + '">' + sevLabel + '</span>';
      html += '<span class="guide-entry-pattern">' + _esc(e.description) + '</span>';
      html += '</div>';
      html += '<div class="guide-entry-detail" id="' + eid + '-detail">';
      html += '<dl>';
      html += '<dt>로그 패턴</dt><dd><code>' + _esc(e.pattern) + '</code></dd>';
      html += '<dt>원인</dt><dd>' + _esc(e.cause) + '</dd>';
      html += '<dt>해결 방법</dt><dd style="white-space:pre-line;">' + _esc(e.resolution) + '</dd>';
      html += '</dl>';
      html += '</div>';
      html += '</div>';
    }

    html += '</div></div>';
  }

  if (!html) html = '<div class="log-empty">일치하는 로그 패턴이 없습니다</div>';
  container.innerHTML = html;
}

function toggleGuideModule(id) {
  const hdr = document.getElementById(id + '-hdr');
  const body = document.getElementById(id + '-body');
  hdr.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleGuideEntry(id) {
  const hdr = document.getElementById(id + '-hdr');
  const detail = document.getElementById(id + '-detail');
  hdr.classList.toggle('open');
  detail.classList.toggle('open');
}

function toggleAllGuide(expand) {
  document.querySelectorAll('.guide-module-header').forEach(h => {
    h.classList.toggle('open', expand);
  });
  document.querySelectorAll('.guide-module-body').forEach(b => {
    b.classList.toggle('open', expand);
  });
  document.querySelectorAll('.guide-entry-header').forEach(h => {
    h.classList.toggle('open', expand);
  });
  document.querySelectorAll('.guide-entry-detail').forEach(d => {
    d.classList.toggle('open', expand);
  });
}

function filterGuide() {
  renderGuide();
}

// Close modal on overlay click
document.addEventListener('click', function(e) {
  if (e.target.id === 'log-guide-modal') closeLogGuide();
});

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  populateAccountFilter();
  loadAlerts();
  loadLogs();
  setupAutoRefresh();
});
</script>
{% endblock %}
