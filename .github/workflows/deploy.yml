name: Deploy

on:
  push:
    branches: [production]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t trading-bot:${{ github.sha }} .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: trading-bot:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker tag trading-bot:${{ github.sha }} ${{ secrets.REGISTRY_URL }}/trading-bot:${{ github.sha }}
          docker tag trading-bot:${{ github.sha }} ${{ secrets.REGISTRY_URL }}/trading-bot:latest
          docker push ${{ secrets.REGISTRY_URL }}/trading-bot:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_URL }}/trading-bot:latest

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "/opt/trading"
          strip_components: 1

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: REGISTRY_PASSWORD,REGISTRY_URL,REGISTRY_USER
          script: |
            cd /opt/trading

            # 레지스트리 로그인 + 이미지 pull
            echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u $REGISTRY_USER --password-stdin

            # 현재 이미지 저장 (롤백용)
            PREV_IMAGE=$(docker compose -f docker-compose.prod.yml images --format json 2>/dev/null | python3 -c "import sys,json; imgs=json.load(sys.stdin); print(next((i['Repository']+':'+i['Tag'] for i in imgs if 'trading-bot' in i.get('Repository','')), ''))" 2>/dev/null || echo "")

            docker pull $REGISTRY_URL/trading-bot:latest

            # DB 마이그레이션
            docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head

            # 컨테이너 시작 (DB 포함 보장)
            docker compose -f docker-compose.prod.yml up -d

            # 헬스체크 (3회 재시도)
            HEALTHY=false
            for i in 1 2 3; do
              sleep 10
              if curl -sf http://localhost:8000/health > /dev/null; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "=== HEALTH CHECK FAILED — ROLLING BACK ==="
              docker compose -f docker-compose.prod.yml logs app --tail=50

              if [ -n "$PREV_IMAGE" ]; then
                IMAGE_TAG="${PREV_IMAGE##*:}" docker compose -f docker-compose.prod.yml up -d
                sleep 10
                curl -sf http://localhost:8000/health && echo "Rollback successful" || echo "Rollback also failed"
              fi
              exit 1
            fi

            # 이전 이미지 정리 (미사용 이미지 전부 삭제 — 디스크 고갈 방지)
            docker image prune -af
            docker builder prune -af 2>/dev/null || true
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}

      - name: Notify deployment status
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            STATUS="${{ job.status }}"
            COMMIT="${{ github.sha }}"
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"Deploy ${STATUS}: ${COMMIT::8} on main\"}" || true
          fi
