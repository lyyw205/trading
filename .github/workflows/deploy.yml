name: Deploy

on:
  push:
    branches: [production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/trading-bot

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "/opt/trading"
          strip_components: 1

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/trading

            # GHCR 로그인 (공개 이미지면 불필요하지만 안전하게)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null || true

            # 이미지 pull만 (서버에서 빌드 없음!)
            docker pull ghcr.io/${{ github.repository_owner }}/trading-bot:latest

            # 이전 이미지 태그 저장 (롤백용)
            PREV_IMAGE=$(docker inspect trading-app-1 --format='{{.Config.Image}}' 2>/dev/null || echo "")

            # DB 마이그레이션
            docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head

            # 컨테이너 시작
            docker compose -f docker-compose.prod.yml up -d

            # 헬스체크 (3회 재시도)
            HEALTHY=false
            for i in 1 2 3; do
              sleep 10
              if curl -sf http://localhost:8000/health > /dev/null; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "=== HEALTH CHECK FAILED — ROLLING BACK ==="
              docker compose -f docker-compose.prod.yml logs app --tail=50

              if [ -n "$PREV_IMAGE" ]; then
                docker pull "$PREV_IMAGE" 2>/dev/null
                docker compose -f docker-compose.prod.yml up -d
                sleep 10
                curl -sf http://localhost:8000/health && echo "Rollback successful" || echo "Rollback also failed"
              fi
              exit 1
            fi

            # 이전 이미지 정리 (디스크 고갈 방지)
            docker image prune -af
            docker builder prune -af 2>/dev/null || true

      - name: Notify deployment status
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            STATUS="${{ job.status }}"
            COMMIT="${{ github.sha }}"
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"Deploy ${STATUS}: ${COMMIT::8}\"}" || true
          fi
